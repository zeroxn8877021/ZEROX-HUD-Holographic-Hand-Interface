<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZEROX // HUD</title>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; }
  body {
    margin: 0; overflow: hidden; background: #000;
    font-family: 'Share Tech Mono', monospace;
  }
  #v_src, #out {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    object-fit: cover;
  }
  #v_src.mirror, #out.mirror { transform: scaleX(-1); }
  #out { z-index: 3; pointer-events: none; }

  /* subtle blue-black tint over the camera feed for a night-vision / sci-fi look */
  .tint {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: radial-gradient(ellipse at center, rgba(0,10,20,0.15), rgba(0,0,10,0.55));
    mix-blend-mode: multiply; pointer-events: none; z-index: 5;
  }

  /* scanline texture for cyberpunk feel */
  .scanlines {
    position: absolute; top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: repeating-linear-gradient(
      to bottom, rgba(0,255,255,0.035) 0px, rgba(0,255,255,0.035) 1px,
      transparent 2px, transparent 3px
    );
    pointer-events: none; z-index: 6; opacity: 0.6;
  }

  /* top-left system branding */
  #brand {
    position: absolute; top: 18px; left: 20px; z-index: 30;
    color: #7df9ff; font-family: 'Orbitron', sans-serif;
    text-shadow: 0 0 8px #00fbff, 0 0 18px rgba(0,251,255,0.6);
    pointer-events: none;
  }
  #brand .logo { font-size: 22px; font-weight: 800; letter-spacing: 4px; }
  #brand .sub { font-size: 10px; letter-spacing: 3px; opacity: 0.75; margin-top: 2px; }

  /* camera switch button */
  #camBtn {
    position: absolute; top: 18px; right: 18px; z-index: 40;
    width: 46px; height: 46px; border-radius: 50%;
    background: rgba(0, 20, 25, 0.55);
    border: 1.5px solid #00e5ff;
    box-shadow: 0 0 10px rgba(0,229,255,0.5), inset 0 0 8px rgba(0,229,255,0.25);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; -webkit-tap-highlight-color: transparent;
  }
  #camBtn svg { width: 22px; height: 22px; fill: #7df9ff; filter: drop-shadow(0 0 4px #00e5ff); }
  #camBtn:active { transform: scale(0.9); }

  /* bottom-right operator id card */
  #idcard {
    position: absolute; bottom: 18px; right: 18px; z-index: 30;
    color: #7df9ff; text-align: right;
    text-shadow: 0 0 6px rgba(0,251,255,0.7);
    font-size: 11px; line-height: 1.6; letter-spacing: 1px;
    pointer-events: none;
  }
  #idcard .name { font-family: 'Orbitron', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 2px; }
  #idcard .tag { opacity: 0.6; font-size: 10px; }

  /* corner frame brackets, classic HUD framing */
  .bracket {
    position: absolute; width: 34px; height: 34px; z-index: 30;
    border: 2px solid #00e5ff; opacity: 0.8;
    filter: drop-shadow(0 0 6px #00e5ff);
    pointer-events: none;
  }
  .tl { top: 14px; left: 14px; border-right: none; border-bottom: none; }
  .tr { top: 14px; right: 14px; border-left: none; border-bottom: none; }
  .bl { bottom: 14px; left: 14px; border-right: none; border-top: none; }
  .br { bottom: 14px; right: 14px; border-left: none; border-top: none; }

  /* the floating holographic panel that appears above an open palm */
  .holo {
    position: absolute; top: 0; left: 0;
    width: 260px; height: 260px;
    transform: translate(-50%, -50%) scale(0.85);
    pointer-events: none; display: none; z-index: 20;
    opacity: 0;
    transition: opacity 0.18s linear;
  }
  .holo .ring {
    position: absolute; top: 50%; left: 50%;
    border: 1.5px solid rgba(0, 229, 255, 0.75);
    border-radius: 50%;
    box-shadow: 0 0 12px rgba(0,229,255,0.5), inset 0 0 12px rgba(0,229,255,0.25);
  }
  .holo .ring1 { width: 210px; height: 210px; margin: -105px 0 0 -105px; animation: spin 6s linear infinite; border-top-color: transparent; border-bottom-color: transparent; }
  .holo .ring2 { width: 160px; height: 160px; margin: -80px 0 0 -80px; animation: spin 4.5s linear infinite reverse; border-left-color: transparent; }
  .holo .ring3 { width: 110px; height: 110px; margin: -55px 0 0 -55px; animation: spin 3s linear infinite; opacity: 0.9; }
  .holo .core {
    position: absolute; top: 50%; left: 50%; width: 8px; height: 8px;
    margin: -4px 0 0 -4px; border-radius: 50%;
    background: #eafcff; box-shadow: 0 0 20px 6px #00e5ff;
  }
  .holo .grid {
    position: absolute; top: 50%; left: 50%; width: 230px; height: 230px;
    margin: -115px 0 0 -115px; opacity: 0.35;
    background-image:
      linear-gradient(rgba(0,229,255,0.5) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.5) 1px, transparent 1px);
    background-size: 23px 23px;
    -webkit-mask-image: radial-gradient(circle, black 55%, transparent 75%);
            mask-image: radial-gradient(circle, black 55%, transparent 75%);
  }
  .holo .label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, 60px);
    font-family: 'Orbitron', sans-serif; font-size: 11px;
    letter-spacing: 3px; color: #baf9ff; white-space: nowrap;
    text-shadow: 0 0 8px #00e5ff;
  }
  .holo .readout {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, 82px);
    font-size: 9px; letter-spacing: 1px; color: rgba(186,249,255,0.75);
    white-space: nowrap;
  }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <video id="v_src" class="mirror" autoplay playsinline muted></video>
  <canvas id="out" class="mirror"></canvas>
  <div class="tint"></div>
  <div class="scanlines"></div>

  <div class="bracket tl"></div>
  <div class="bracket tr"></div>
  <div class="bracket bl"></div>
  <div class="bracket br"></div>

  <div id="brand">
    <div class="logo">ZEROX</div>
    <div class="sub">HAND INTERFACE ONLINE</div>
  </div>

  <div id="camBtn" title="Switch camera">
    <svg viewBox="0 0 24 24"><path d="M20 4h-3.17L15 2H9L7.17 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-8 13a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm7-10.5-2 2 2 2 2-2-2-2zM5 7l2 2-2 2-2-2 2-2z"/></svg>
  </div>

  <div id="idcard">
    <div class="name">PARAS &middot; ZEROX</div>
    <div class="tag">OPERATOR ID // ZRX-001</div>
    <div class="tag">hoshinegai &middot; nocturne systems</div>
  </div>

  <!-- one holographic panel per hand -->
  <div class="holo" id="holoL">
    <div class="grid"></div>
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="core"></div>
    <div class="label">ZEROX // L</div>
    <div class="readout">SYNC 00%</div>
  </div>
  <div class="holo" id="holoR">
    <div class="grid"></div>
    <div class="ring ring1"></div>
    <div class="ring ring2"></div>
    <div class="ring ring3"></div>
    <div class="core"></div>
    <div class="label">ZEROX // R</div>
    <div class="readout">SYNC 00%</div>
  </div>

  <script>
    const vElement = document.getElementById('v_src');
    const cElement = document.getElementById('out');
    const ctx = cElement.getContext('2d');
    const holo = [document.getElementById('holoL'), document.getElementById('holoR')];
    const readout = holo.map(h => h.querySelector('.readout'));

    let pwr = [0, 0];

    function checkOpen(pts) {
        let count = 0;
        const wrist = pts[0];
        const tips = [8, 12, 16, 20];
        const pips = [6, 10, 14, 18];
        for (let i = 0; i < tips.length; i++) {
            const tip = pts[tips[i]];
            const pip = pts[pips[i]];
            if (Math.hypot(tip.x - wrist.x, tip.y - wrist.y) > Math.hypot(pip.x - wrist.x, pip.y - wrist.y)) count++;
        }
        return count >= 3;
    }

    function onResults(res) {
        cElement.width = vElement.videoWidth;
        cElement.height = vElement.videoHeight;
        ctx.save();
        ctx.clearRect(0, 0, cElement.width, cElement.height);

        let seen = [false, false];

        if (res.multiHandLandmarks && res.multiHandedness) {
            res.multiHandLandmarks.forEach((pts, i) => {
                const label = res.multiHandedness[i].label;
                const isR = label === 'Right';
                const idx = isR ? 1 : 0;
                seen[idx] = true;

                // cyan tech skeleton
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00e5ff';
                drawConnectors(ctx, pts, HAND_CONNECTIONS, {color: 'rgba(0,229,255,0.85)', lineWidth: 2});
                drawLandmarks(ctx, pts, {color: '#eafcff', lineWidth: 1, radius: 2});
                ctx.restore();

                const open = checkOpen(pts);
                pwr[idx] += open ? 0.06 : -0.12;
                pwr[idx] = Math.max(0, Math.min(1, pwr[idx]));

                const wrist = pts[0];
                const knk = pts[9];
                const tx = (wrist.x + knk.x) / 2;
                const ty = (wrist.y + knk.y) / 2;

                if (pwr[idx] > 0.01) {
                    const h = holo[idx];
                    h.style.left = `${(1 - tx) * window.innerWidth}px`;
                    h.style.top = `${(ty * window.innerHeight) - 90}px`;
                    h.style.display = 'block';
                    h.style.opacity = pwr[idx];
                    h.style.transform = `translate(-50%, -50%) scale(${0.7 + pwr[idx] * 0.35})`;
                    readout[idx].textContent = `SYNC ${Math.round(pwr[idx] * 100)}%`;
                } else {
                    holo[idx].style.display = 'none';
                }
            });
        }

        [0, 1].forEach(idx => {
            if (!seen[idx]) {
                pwr[idx] = Math.max(0, pwr[idx] - 0.12);
                if (pwr[idx] <= 0.01) holo[idx].style.display = 'none';
            }
        });

        ctx.restore();
    }

    const h = new Hands({
        locateFile: (f) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });

    h.setOptions({
        maxNumHands: 2,
        modelComplexity: 1,
        minDetectionConfidence: 0.65,
        minTrackingConfidence: 0.65
    });

    h.onResults(onResults);

    // --- manual camera handling so we can flip front/back on demand ---
    let currentStream = null;
    let currentFacing = 'user';
    let loopRunning = false;
    const camBtn = document.getElementById('camBtn');

    async function renderLoop() {
        if (vElement.readyState >= 2) {
            await h.send({ image: vElement });
        }
        requestAnimationFrame(renderLoop);
    }

    async function startCamera(facing) {
        if (currentStream) {
            currentStream.getTracks().forEach(t => t.stop());
        }
        const constraints = {
            video: { facingMode: { ideal: facing }, width: 1280, height: 720 },
            audio: false
        };
        currentStream = await navigator.mediaDevices.getUserMedia(constraints);
        vElement.srcObject = currentStream;
        await new Promise(res => { vElement.onloadedmetadata = () => res(); });
        currentFacing = facing;

        // only mirror the "selfie" front camera view, not the rear camera
        const mirrorOn = facing === 'user';
        vElement.classList.toggle('mirror', mirrorOn);
        cElement.classList.toggle('mirror', mirrorOn);

        if (!loopRunning) {
            loopRunning = true;
            renderLoop();
        }
    }

    camBtn.addEventListener('click', () => {
        const next = currentFacing === 'user' ? 'environment' : 'user';
        startCamera(next).catch(err => console.error('Camera switch failed:', err));
    });

    startCamera('user').catch(err => console.error('Camera start failed:', err));
  </script>
</body>
</html>
